name: Code Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run Tests with Coverage
        run: mvn clean verify jacoco:report

      - name: Code Style Check (Checkstyle)
        run: mvn checkstyle:check || true
        continue-on-error: true

      - name: SpotBugs Analysis
        run: mvn spotbugs:check || true
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=hafalat-backend
            -Dsonar.organization=sayfoudinesoumya
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check || true
        continue-on-error: true

      - name: Generate Quality Report
        if: always()
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Coverage (JaCoCo)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Style (Checkstyle)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Bug Detection (SpotBugs)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarCloud Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Audit (OWASP)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Quality Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            target/site/
            target/checkstyle-result.xml
            target/spotbugs.xml
